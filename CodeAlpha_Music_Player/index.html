<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Logo and Branding -->
    <div class="branding">
        <div class="logo">
            <i class="fas fa-music"></i>
            <span class="brand-name">NivoVibes</span>
        </div>
    </div>

    <div class="app-container">
        <!-- Theme Toggle -->
        <button class="theme-toggle" id="themeToggle">
            <i class="fas fa-moon"></i>
        </button>

        <!-- Main Player -->
        <div class="player-container">
            <div class="album-art-container">
                <div class="album-art" id="albumArt">
                    <img src="https://picsum.photos/seed/music1/400/400.jpg" alt="Album Art" id="albumImage">
                    <div class="loading-spinner" id="loadingSpinner">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>

            <div class="track-info">
                <h2 class="track-title" id="trackTitle">Midnight Dreams</h2>
                <p class="track-artist" id="trackArtist">Luna Echo</p>
            </div>

            <div class="progress-container">
                <span class="time current-time" id="currentTime">0:00</span>
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                    <div class="progress-handle" id="progressHandle"></div>
                </div>
                <span class="time total-time" id="totalTime">3:45</span>
            </div>

            <div class="controls">
                <button class="control-btn shuffle-btn" id="shuffleBtn">
                    <i class="fas fa-random"></i>
                </button>
                <button class="control-btn prev-btn" id="prevBtn">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn play-pause-btn" id="playPauseBtn">
                    <i class="fas fa-play" id="playPauseIcon"></i>
                </button>
                <button class="control-btn next-btn" id="nextBtn">
                    <i class="fas fa-step-forward"></i>
                </button>
                <button class="control-btn repeat-btn" id="repeatBtn">
                    <i class="fas fa-redo"></i>
                </button>
            </div>

            <div class="volume-container">
                <button class="volume-btn" id="volumeBtn">
                    <i class="fas fa-volume-up" id="volumeIcon"></i>
                </button>
                <div class="volume-slider">
                    <input type="range" class="volume-input" id="volumeInput" min="0" max="100" value="70">
                    <div class="volume-progress" id="volumeProgress"></div>
                </div>
            </div>
        </div>

        <!-- Playlist -->
        <div class="playlist-container">
            <div class="playlist-header">
                <h3>Playlist</h3>
                <span class="track-count" id="trackCount">8 tracks</span>
            </div>
            <div class="playlist" id="playlist">
                <!-- Playlist items will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="audioPlayer"></audio>

    <!-- Keyboard Shortcuts Info -->
    <div class="shortcuts-info">
        <div class="shortcuts-toggle" id="shortcutsToggle">
            <i class="fas fa-keyboard"></i>
        </div>
        <div class="shortcuts-panel" id="shortcutsPanel">
            <h4>Keyboard Shortcuts</h4>
            <div class="shortcut">
                <kbd>Space</kbd> Play/Pause
            </div>
            <div class="shortcut">
                <kbd>←</kbd> Previous
            </div>
            <div class="shortcut">
                <kbd>→</kbd> Next
            </div>
            <div class="shortcut">
                <kbd>↑</kbd> Volume Up
            </div>
            <div class="shortcut">
                <kbd>↓</kbd> Volume Down
            </div>
            <div class="shortcut">
                <kbd>M</kbd> Mute/Unmute
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
